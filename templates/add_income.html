{% extends "base.html" %}
{% block content %}

<!-- ── Page Header ── -->
<div class="page-header" style="animation: fadeSlideDown 0.4s ease both;">
    <h2>Add Income</h2>
    <p class="subtitle">Track your earnings and stay in control</p>
</div>

<!-- ── Form Card ── -->
<div class="card" style="max-width:520px; animation: fadeSlideUp 0.45s ease both;">

    <form method="POST" onsubmit="return validateIncome()">

        <!-- Source -->
        <div class="form-group">
            <label>Income Source</label>
            <input name="source" class="form-control" placeholder="Salary / Freelance / Business" required>
        </div>

        <!-- Amount -->
        <div class="form-group">
            <label>Amount</label>
            <input name="amount" type="number" class="form-control" placeholder="Enter amount" required>
        </div>

        <!-- Date -->
        <div class="form-group">
            <label>Date</label>
            <input name="date" type="date" class="form-control">
        </div>

        <!-- Submit Button -->
        <div style="margin-top:10px;">
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                ➕ Add Income
            </button>
        </div>

    </form>
</div>

<!-- ── Popup UI ── -->
<div id="popup" style="position:fixed; top:20px; right:20px; background:var(--danger);
            color:#fff; padding:12px 18px; border-radius:10px;
            font-size:13px; display:none; box-shadow:var(--shadow-md); z-index:999;">
</div>

<script>
    function showPopup(msg) {
        const popup = document.getElementById("popup");
        popup.textContent = msg;
        popup.style.display = "block";

        setTimeout(() => {
            popup.style.display = "none";
        }, 2500);
    }

    function validateIncome() {
        const amount = document.querySelector('[name="amount"]').value;

        if (amount <= 0) {
            showPopup("Invalid income amount!");
            return false;
        }

        return true;
    }
</script>

{% endblock %}
